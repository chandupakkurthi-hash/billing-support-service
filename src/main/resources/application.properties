spring.application.name=billing-support-service
server.port=8084

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

spring.datasource.url=${BILLING_DB_URL}
spring.datasource.username=${BILLING_DB_USERNAME}
spring.datasource.password=${BILLING_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}

eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER}
eureka.instance.prefer-ip-address=true

stripe.secret.key=${STRIPE_SECRET_KEY}
webui.base-url=${WEBUI_BASE_URL}

subscription.expiry-minutes=60

openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=openai/gpt-oss-120b:free
