spring.application.name=billing-support-service

server.port=8084

# PostgreSQL (Billing DB)
spring.datasource.url=${BILLING_DB_URL:jdbc:postgresql://localhost:5432/nobroker_billing}
spring.datasource.username=${BILLING_DB_USERNAME:postgres}
spring.datasource.password=${BILLING_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT secret (Base64) - should match Auth-Service
jwt.secret=${JWT_SECRET:}

# Register with Eureka
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Stripe
stripe.secret.key=${STRIPE_SECRET_KEY:}
webui.base-url=${WEBUI_BASE_URL:http://localhost:8080}

# Subscription expiry (minutes) - keep same as monolith demo default
subscription.expiry-minutes=60

# OpenRouter for Natasha chatbot (optional)
# Prefer env var so keys don't get committed: export OPENROUTER_API_KEY="..."
openrouter.api.key=${OPENROUTER_API_KEY:}
# You can override if a model changes/gets rate-limited:
openrouter.model=openai/gpt-oss-120b:free
